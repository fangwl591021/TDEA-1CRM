<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TDEA CRM - Login</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 採用系統預設字體能更貼近原生 App 體驗，保留 Noto Sans TC 作為 fallback */
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500&display=swap');
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, 'Noto Sans TC', sans-serif; background-color: #FFFFFF; margin: 0; }
    * { border-radius: 0 !important; }
    
    .line-green-text { color: #06C755; }
    .line-green-border { border-color: #06C755; }
    .line-green-bg { background-color: #06C755; }
    
    /* 輕量化輸入框，僅保留底線 */
    .input-minimal {
      border: none;
      border-bottom: 1px solid #E5E7EB;
      background-color: transparent;
      padding: 12px 0;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-minimal:focus {
      border-bottom-color: #06C755;
    }
    
    /* 頁籤底線設計 */
    .tab-active {
      color: #06C755;
      border-bottom: 2px solid #06C755;
    }
    .tab-inactive {
      color: #9CA3AF;
      border-bottom: 2px solid transparent;
    }
  </style>
</head>
<body class="min-h-screen bg-white">
  
  <!-- 載入中畫面：滿版置中，無框線 -->
  <div id="loader" class="flex flex-col items-center justify-center min-h-screen p-6 space-y-6">
    <div id="profilePreview" class="hidden flex flex-col items-center space-y-4">
      <img id="briefAvatar" class="w-20 h-20 object-cover bg-gray-50 border border-gray-100" src="" />
      <p id="briefName" class="text-gray-900 text-lg tracking-wide"></p>
    </div>
    <div class="w-8 h-8 border-2 border-gray-100 border-t-[#06C755] animate-spin"></div>
    <p class="text-gray-400 text-[11px] uppercase tracking-widest">Verifying Identity...</p>
  </div>

  <!-- 綁定表單：滿版設計，無包框陰影 -->
  <div id="bindForm" class="hidden w-full h-screen flex flex-col bg-white">
    
    <!-- 頂部用戶資訊區塊 -->
    <div class="px-6 pt-12 pb-8 flex flex-col items-center bg-white border-b border-gray-50">
      <img id="avatar" class="w-20 h-20 object-cover bg-gray-50 border border-gray-100 mb-4" src="" />
      <h1 class="text-xl text-gray-900"><span id="name">用戶</span>，您好</h1>
      <p class="text-[11px] text-gray-400 mt-2 tracking-widest uppercase">請完成身分綁定</p>
    </div>

    <!-- 頁籤切換區塊 (原生底線設計) -->
    <div class="flex border-b border-gray-100 px-4">
      <button onclick="setType('association')" id="btn-assoc" class="flex-1 py-3 text-sm tab-active transition-colors">本業</button>
      <button onclick="setType('vendor')" id="btn-vendor" class="flex-1 py-3 text-sm tab-inactive transition-colors">廠商</button>
      <button onclick="setType('general')" id="btn-guest" class="flex-1 py-3 text-sm tab-inactive transition-colors">一般</button>
    </div>

    <!-- 表單輸入區塊 -->
    <div class="flex-1 p-6 space-y-8">
      <div class="space-y-6">
        <div id="idGroup">
          <label class="text-[11px] text-gray-400 uppercase tracking-widest block mb-1">會員編號</label>
          <input id="mid" type="text" class="input-minimal text-base text-gray-900 placeholder-gray-300" placeholder="例如: Z1090001" />
        </div>
        <div>
          <label class="text-[11px] text-gray-400 uppercase tracking-widest block mb-1">手機號碼</label>
          <input id="phone" type="tel" class="input-minimal text-base text-gray-900 placeholder-gray-300" placeholder="例如: 0912345678" />
        </div>
      </div>
      
      <!-- 底部按鈕區塊 -->
      <div class="pt-8 mt-auto">
        <button onclick="submitBind()" id="submitBtn" class="w-full border line-green-border line-green-text py-3.5 text-base bg-transparent active:line-green-bg active:text-white transition-colors disabled:opacity-50 disabled:bg-gray-50 disabled:border-gray-200 disabled:text-gray-400">
          確認綁定
        </button>
      </div>
    </div>
    
  </div>

  <script>
    const LIFF_ID = "2005868456-Rt5YK7qL";
    let curType = "association", uid = "";

    // 使用 /api 路徑呼叫 Worker 代理
    const callApi = async (action, data) => {
      const res = await fetch(`/api?action=${action}`, {
        method: 'POST',
        body: JSON.stringify({ action, ...data })
      });
      return await res.json();
    };

    window.onload = async () => {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const p = await liff.getProfile();
        uid = p.userId;
        
        document.getElementById('briefAvatar').src = p.pictureUrl;
        document.getElementById('briefName').textContent = p.displayName;
        document.getElementById('profilePreview').classList.remove('hidden');
        document.getElementById('avatar').src = p.pictureUrl;
        document.getElementById('name').textContent = p.displayName;

        // 呼叫後端檢查
        const res = await callApi('check', { userId: uid });
        
        if (res.status === 'admin') window.location.href = "index.html";
        else if (res.status === 'member') window.location.href = "activity.html";
        else showBindingForm();

      } catch (e) { console.error(e); showBindingForm(); }
    };

    function showBindingForm() {
      document.getElementById('loader').classList.add('hidden');
      document.getElementById('bindForm').classList.remove('hidden');
      setType('association');
    }

    function setType(t) {
      curType = t;
      // 重置所有頁籤樣式
      ['assoc', 'vendor', 'guest'].forEach(id => {
        const btn = document.getElementById('btn-' + id);
        btn.classList.remove('tab-active');
        btn.classList.add('tab-inactive');
      });
      
      // 設定當前選中的頁籤樣式
      const activeBtnId = t === 'association' ? 'assoc' : t === 'vendor' ? 'vendor' : 'guest';
      const activeBtn = document.getElementById('btn-' + activeBtnId);
      activeBtn.classList.remove('tab-inactive');
      activeBtn.classList.add('tab-active');
      
      // 顯示或隱藏會員編號欄位
      document.getElementById('idGroup').style.display = t === 'general' ? 'none' : 'block';
    }

    async function submitBind() {
      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.textContent = "連線驗證中...";
      try {
        const res = await callApi('bindMember', { 
          userId: uid, type: curType, 
          memberId: document.getElementById('mid').value.trim(), 
          phone: document.getElementById('phone').value.trim() 
        });
        if (res.success) { 
          alert("綁定成功！"); 
          window.location.href = "activity.html"; 
        } else { 
          alert("綁定失敗：" + res.message); 
          btn.disabled = false; 
          btn.textContent = "確認綁定"; 
        }
      } catch (e) { 
        console.error("Binding error:", e);
        alert("連線發生錯誤，請稍後再試。");
        btn.disabled = false;
        btn.textContent = "確認綁定";
      }
    }
  </script>
</body>
</html>
